{% load static %}
{% include "Admin/header.html" %}

<div class="main-panel">        
    <div class="content-wrapper">
        <div class="row">
            <div class="col-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">

                        <h4 class="card-title">Edit District</h4>

                        <!-- Alert Messages -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form class="forms-sample" action="" method="post" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="form-group mb-3">
                                <label for="districtName" class="form-label">District Name</label>
                                <input type="text"
                                       class="form-control"
                                       id="districtName"
                                       name="districtname"
                                       value="{{ d.district_name }}"
                                       placeholder="District Name"
                                       required
                                       pattern="[A-Z][a-zA-Z\s]*" title="Name must start with a capital letter and contain only letters and spaces">
                            </div>
                            
                            <button type="submit" name="submit" class="btn btn-primary me-2">Update</button>
                            <a href="{% url 'viewdistrict' %}" class="btn btn-light">Cancel</a>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
    {% include "admin/footer.html" %}
</div>
