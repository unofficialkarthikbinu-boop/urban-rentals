<!-- Custom JS for Sidebar -->
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('active');
  }

  // Close sidebar when clicking outside on mobile
  document.addEventListener('click', function(event) {
    const sidebar = document.getElementById('sidebar');
    const toggler = document.querySelector('.navbar-toggler-right');
    
    if (window.innerWidth < 991) {
        if (!sidebar.contains(event.target) && !toggler.contains(event.target) && sidebar.classList.contains('active')) {
            sidebar.classList.remove('active');
        }
    }
  });
</script>

<script>

  // Handle Mobile Sidebar Toggle (Offcanvas)
  function toggleSidebar() {

</script>
