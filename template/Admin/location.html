{% load static %}
{% include "Admin/header.html" %}

<div class="main-panel">        
    <div class="content-wrapper">
        <div class="row">
            <div class="col-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">

                        <h4 class="card-title">Location Registration</h4>

                        <!-- 🔔 Alert Messages -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}
                        <!-- END ALERTS -->

                        <form class="forms-sample" action="" method="post">
                            {% csrf_token %}

                            <!-- District Dropdown -->
                            <div class="form-group mb-3">
                                <label for="district" class="form-label">Select District</label>
                                <select class="form-select" id="district" name="district_id" required>
                                    <option value="">-- Select District --</option>
                                    {% for d in districtdata %}
                                        <option value="{{ d.district_id }}">{{ d.district_name }}</option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Location Name -->
                            <div class="form-group mb-3">
                                <label for="location_name" class="form-label">Location Name</label>
                                <input type="text" 
                                       class="form-control" 
                                       id="location_name" 
                                       name="location_name" 
                                       placeholder="Enter Location Name" 
                                       required
                                       pattern="[A-Z][a-zA-Z\s]*" 
                                       title="Name must start with a capital letter and contain only letters and spaces">
                            </div>
                            
                            <button type="submit" class="btn btn-primary me-2">Submit</button>
                            <button type="reset" class="btn btn-light">Cancel</button>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>
{% include "Admin/footer.html" %}
