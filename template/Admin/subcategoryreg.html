{% load static %}
{% include "Admin/header.html" %}

<div class="main-panel">        
    <div class="content-wrapper">
        <div class="row">
            <div class="col-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">

                        <h4 class="card-title">Subcategory Registration</h4>

                        <!-- Alert Messages -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <!-- FORM -->
                        <form class="forms-sample" method="post" enctype="multipart/form-data">
                            {% csrf_token %}

                            <!-- Category Dropdown -->
                            <div class="form-group mb-3">
                                <label for="category" class="form-label">Category</label>
                                <select 
                                    class="form-select" 
                                    id="category" 
                                    name="category_id"
                                    required
                                >
                                    <option value="">-- Select Category --</option>
                                    {% for cat in categorydata %}
                                        <option value="{{ cat.category_id }}">
                                            {{ cat.category_name }}
                                        </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Subcategory Name -->
                            <div class="form-group mb-3">
                                <label for="subcategoryName" class="form-label">Subcategory Name</label>
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="subcategoryName" 
                                    name="subcategory_name"
                                    placeholder="Enter Subcategory Name"
                                    required
                                    pattern="[A-Z][a-zA-Z\s]*" 
                                    title="Name must start with a capital letter and contain only letters and spaces"
                                >
                            </div>

                            <!-- Description -->
                            <div class="form-group mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea 
                                    class="form-control" 
                                    id="description" 
                                    name="description" 
                                    rows="3"
                                    placeholder="Enter Subcategory Description">
                                </textarea>
                            </div>

                            <!-- Image Upload -->
                            <div class="form-group mb-3">
                                <label for="subcategoryImage" class="form-label">Subcategory Image</label>
                                <input 
                                    type="file" 
                                    class="form-control" 
                                    id="subcategoryImage" 
                                    name="subcategory_image"
                                    accept="image/*"
                                >
                            </div>

                            <!-- Buttons -->
                            <button type="submit" class="btn btn-primary me-2">
                                Submit
                            </button>
                            <button type="reset" class="btn btn-light">
                                Cancel
                            </button>

                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</div>

{% include "Admin/footer.html" %}
