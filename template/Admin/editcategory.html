{% load static %}
{% include "Admin/header.html" %}

<div class="main-panel">
    <div class="content-wrapper">
        <div class="row">
            <div class="col-12 grid-margin stretch-card">
                <div class="card">
                    <div class="card-body">
                        <h4 class="card-title">Edit Category</h4>
                        <p class="card-description">
                            Update category details
                        </p>
                        
                        <!-- Alert Messages -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                    {{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form class="forms-sample" method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="form-group mb-3">
                                <label for="categoryName" class="form-label">Category Name</label>
                                <input type="text" class="form-control" id="categoryName" name="category_name" value="{{ category.category_name }}" placeholder="Category Name" required pattern="[A-Z][a-zA-Z\s]*" title="Name must start with a capital letter and contain only letters and spaces">
                            </div>
                            <div class="form-group mb-3">
                                <label for="categoryDescription" class="form-label">Description</label>
                                <textarea class="form-control" id="categoryDescription" name="category_description" rows="4">{{ category.description|default:"" }}</textarea>
                            </div>
                            <div class="form-group mb-3">
                                <label for="categoryImage" class="form-label">Category Image</label>
                                {% if category.category_image %}
                                    <div class="mb-2">
                                        <img src="{{ category.category_image.url }}" alt="Current Image" class="img-thumbnail" style="width: 150px;">
                                    </div>
                                {% endif %}
                                <input type="file" class="form-control" id="categoryImage" name="category_image" accept="image/*">
                            </div>
                            <button type="submit" class="btn btn-primary me-2">Update</button>
                            <a href="{% url 'viewcategory' %}" class="btn btn-light">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% include "Admin/footer.html" %}
</div>
