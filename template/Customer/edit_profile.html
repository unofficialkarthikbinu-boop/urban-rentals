{% extends 'customer/base.html' %}
{% load static %}

{% block content %}
<style>
    /* Dashboard Layout */
    .dashboard-container {
        max-width: 800px;
        margin: 0 auto;
        padding-top: 3rem;
        padding-bottom: 5rem;
    }

    /* Main Content Styling */
    .dashboard-card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        padding: 2.5rem;
        margin-bottom: 2rem;
        border: 1px solid #f1f3f5;
    }

    .card-header-styled {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #f0f0f0;
    }

    .card-title-styled {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0;
        color: #212529;
    }

    .form-label {
        font-weight: 600;
        color: #495057;
        margin-bottom: 0.5rem;
    }
</style>

<div class="bg-light min-vh-100">
    <div class="dashboard-container container">
        
        <div class="dashboard-card">
            <div class="card-header-styled">
                <h2 class="card-title-styled mb-0">Edit Profile</h2>
                <a href="{% url 'customer_profile' %}" class="btn btn-outline-secondary btn-sm rounded-pill">
                    <i class="bi bi-arrow-left me-1"></i> Back to Profile
                </a>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="row g-4">
                    <div class="col-md-6">
                        <label for="name" class="form-label">Full Name *</label>
                        <input type="text" class="form-control" id="name" name="name" 
                               value="{{ customer.name }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="email" class="form-label">Email Address *</label>
                        <input type="email" class="form-control" id="email" name="email" 
                               value="{{ customer.email }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="phone" class="form-label">Phone Number *</label>
                        <input type="tel" class="form-control" id="phone" name="phone" 
                               value="{{ customer.phone }}" required>
                    </div>
                    
                    <div class="col-12">
                        <label for="address" class="form-label">Primary Address *</label>
                        <textarea class="form-control" id="address" name="address" rows="3" required>{{ customer.address }}</textarea>
                    </div>
                    
                    <div class="col-12 text-end mt-4">
                        <a href="{% url 'customer_profile' %}" class="btn btn-light me-2">Cancel</a>
                        <button type="submit" class="btn btn-dark px-4">Save Changes</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
