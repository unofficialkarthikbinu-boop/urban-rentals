<body class="index-page">

  <!-- Defined Vendor Theme in Header  -->
  <style>
    :root {
      /* Vendor Professional Theme */
      --vendor-primary: #0B2447;      /* Deep Midnight Blue */
      --vendor-secondary: #19376D;    /* Dark Navy Blue */
      --vendor-accent: #576CBC;       /* Periwinkle Blue */
      --vendor-light: #A5D7E8;        /* Light Ice Blue */
      --vendor-bg: #f0f2f5;           /* Light Grey Background */
      --vendor-surface: #ffffff;
      --vendor-card-bg: #ffffff;      /* Card Background */
      
      /* Overriding Bootstrap Variables where possible via class overrides */
    }

    /* Global Body Background */
    body {
      background-color: var(--vendor-bg) !important;
      color: var(--vendor-text);
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    main#main {
      display: block;
      width: 100%;
      background-color: var(--vendor-bg);
    }

    .section, .dashboard-section {
      display: block;
      width: 100%;
      background-color: var(--vendor-bg);
    }

    .container {
      display: block;
      width: 100%;
    }

    /* Header Styling */
    #header {
      background: var(--vendor-primary) !important;
      color: #fff !important;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }
    
    .topbar {
        background: #06142e !important; /* Darker shade of primary */
        border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .branding, .navmenu {
        background: var(--vendor-primary) !important;
    }

    .navmenu a {
        color: rgba(255,255,255,0.85) !important;
        font-weight: 500;
    }

    .navmenu a:hover, .navmenu a.active {
        color: #fff !important;
    }

    .sitename {
        color: #fff !important;
    }

    /* Button Standardization */
    .btn-primary {
        background-color: var(--vendor-secondary) !important;
        border-color: var(--vendor-secondary) !important;
    }
    .btn-primary:hover {
        background-color: #0b5ed7 !important;
    }

    .btn-outline-primary {
        color: var(--vendor-secondary) !important;
        border-color: var(--vendor-secondary) !important;
    }
    .btn-outline-primary:hover {
        background-color: var(--vendor-secondary) !important;
        color: #fff !important;
    }
    
    .btn-add-product {
        background-color: var(--vendor-secondary) !important;
        color: white !important;
        border-radius: 50px !important;
        padding: 8px 20px !important;
        font-weight: 500;
        transition: 0.3s;
    }
    .btn-add-product:hover {
        background-color: #0b5ed7 !important;
        transform: translateY(-2px);
    }

    /* Dashboard Cards */
    .dashboard-card, .card {
        border: none !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important;
        background: var(--vendor-card-bg) !important;
    }

    .section-header {
      border-bottom: 1px solid #edf2f4 !important;
    }
    
    .card-title-styled {
       color: var(--vendor-primary) !important;
    }

    /* Sidebar - ensuring it follows theme */
    .dashboard-sidebar {
        background-color: #fff !important;
        border: none !important;
        box-shadow: 0 4px 20px rgba(0,0,0,0.05) !important;
    }

    .user-avatar { 
        background: linear-gradient(135deg, var(--vendor-primary), var(--vendor-accent)) !important; 
        color: white !important;
    }
    
    .nav-link-dashboard.active {
        background-color: #edf2f4 !important;
        color: var(--vendor-primary) !important;
        border-left: 3px solid var(--vendor-primary) !important;
    }
    
    .nav-link-dashboard:hover {
        color: var(--vendor-primary) !important;
    }

    /* Table Styling */
    .table thead th {
        background-color: #f8f9fa !important;
        color: #6c757d !important;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
        border-bottom: 2px solid #edf2f4;
    }
  </style>
</head>
